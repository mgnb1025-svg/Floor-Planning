<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TileArchitect AI Pro | Ultimate Pattern Engine</title>
    <style>
        :root { --pro-gold: #d4af37; --ai-purple: #8a2be2; --success: #38a169; --bg: #1a202c; --card: #ffffff; }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: var(--bg); color: #333; overflow: hidden; }
        @media (min-width: 768px) { body { flex-direction: row; } .sidebar { width: 400px; height: 100vh; } }
        .sidebar { background: var(--card); border-right: 1px solid #e2e8f0; overflow-y: auto; padding: 20px; flex-shrink: 0; box-sizing: border-box; }
        .viewport { flex-grow: 1; position: relative; background: #2d3748; display: flex; align-items: center; justify-content: center; padding: 20px; }
        section { border-bottom: 1px solid #edf2f7; padding: 15px 0; }
        h3 { font-size: 14px; color: #4a5568; margin: 0 0 10px 0; text-transform: uppercase; letter-spacing: 1px; }
        label { font-size: 10px; font-weight: bold; color: #718096; display: block; margin-bottom: 5px; }
        input, select, button { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #cbd5e0; margin-bottom: 10px; font-size: 14px; box-sizing: border-box; }
        .btn-ai { background: var(--ai-purple); color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-pay { background: var(--success); color: white; border: none; font-weight: bold; cursor: pointer; }
        canvas { background: white; border-radius: 4px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); max-width: 100%; height: auto; }
        .locked canvas { filter: grayscale(1) opacity(0.5); }
    </style>
</head>
<body class="locked" id="app">

<div class="sidebar">
    <h2 style="margin:0 0 20px 0; font-size: 22px;">TileArchitect <span style="color:var(--ai-purple)">AI</span></h2>

    <section>
        <h3>📐 1. Room Data</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div><label>LENGTH (FT)</label><input type="number" id="roomL" value="12" oninput="update()"></div>
            <div><label>WIDTH (FT)</label><input type="number" id="roomW" value="10" oninput="update()"></div>
        </div>
    </section>

    <section>
        <h3>🎨 2. Master Pattern Library</h3>
        <label>SELECT DESIGN METHOD</label>
        <select id="pattern" onchange="update()">
            <option value="stack">Stack Bond (Straight)</option>
            <option value="brick">Brick Joint (50% Offset)</option>
            <option value="stagger">1/3 Stagger (LVP Style)</option>
            <option value="vertical">Vertical Stack (Soldier)</option>
            <option value="herringbone">Herringbone (45 Degree)</option>
        </select>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div><label>TILE WIDTH (IN)</label><input type="number" id="tileW" value="12" oninput="update()"></div>
            <div><label>TILE HEIGHT (IN)</label><input type="number" id="tileH" value="24" oninput="update()"></div>
        </div>
    </section>

    <section id="wasteModule" style="background: #ebf8ff; padding: 15px; border-radius: 8px; border: 1px solid #bee3f8;">
        <h3 style="color:#2b6cb0; margin:0;">📊 Material Logistics</h3>
        <div style="font-size: 18px; margin: 5px 0;"><strong id="boxCount">0</strong> Boxes</div>
        <div id="aiAdvice" style="font-size: 11px; color: #2c5282;">AI: Complexity is low. Standard waste applied.</div>
    </section>

    <section>
        <button class="btn-ai" onclick="runAI()">✨ AI Pattern Optimization</button>
        <button class="btn-pay" style="margin-top:10px;" onclick="unlock()">Unlock Full Cut-List (<span id="price">$0.00</span>)</button>
    </section>
</div>

<div class="viewport">
    <canvas id="canvas" width="800" height="800"></canvas>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    function update() {
        const rL = parseFloat(document.getElementById('roomL').value) || 0;
        const rW = parseFloat(document.getElementById('roomW').value) || 0;
        const tW = parseFloat(document.getElementById('tileW').value) || 12;
        const tH = parseFloat(document.getElementById('tileH').value) || 12;
        const pattern = document.getElementById('pattern').value;

        const sqft = rL * rW;
        document.getElementById('price').innerText = "$" + (sqft * 0.10).toFixed(2);
        
        let waste = 0.07;
        if(pattern === 'herringbone') {
            waste = 0.20; 
            document.getElementById('aiAdvice').innerText = "AI Warning: Herringbone requires 20% waste for corner cuts.";
        } else if (pattern !== 'stack') {
            waste = 0.12;
            document.getElementById('aiAdvice').innerText = "AI: Offset pattern detected. 12% waste recommended.";
        } else {
            document.getElementById('aiAdvice').innerText = "AI: Complexity is low. Standard 7% waste applied.";
        }
        
        document.getElementById('boxCount').innerText = Math.ceil((sqft * (1 + waste)) / 22.5);
        draw(rL, rW, tW, tH, pattern);
    }

    function draw(rL, rW, tW, tH, pattern) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const margin = 50;
        const scale = Math.min((canvas.width - 100) / rL, (canvas.height - 100) / rW);
        const drawW = rL * scale;
        const drawH = rW * scale;
        const twP = (tW / 12) * scale;
        const thP = (tH / 12) * scale;

        ctx.strokeStyle = "#cbd5e0";
        ctx.save();
        ctx.beginPath();
        ctx.rect(margin, margin, drawW, drawH);
        ctx.clip(); // Clip pattern to room boundary

        if (pattern === 'herringbone') {
            drawHerringbone(margin, margin, drawW, drawH, twP, thP);
        } else {
            drawStandard(margin, margin, drawW, drawH, twP, thP, pattern);
        }
        ctx.restore();

        // Room Boundary
        ctx.strokeStyle = "#1a202c";
        ctx.lineWidth = 5;
        ctx.strokeRect(margin, margin, drawW, drawH);
    }

    function drawStandard(mX, mY, rW, rH, tw, th, type) {
        let row = 0;
        for (let y = mY - th; y < mY + rH + th; y += th) {
            let offset = 0;
            if (type === 'brick' && row % 2 !== 0) offset = tw / 2;
            if (type === 'stagger' && row % 2 !== 0) offset = tw / 3;
            
            for (let x = mX - tw; x < mX + rW + tw; x += tw) {
                ctx.strokeRect(x + offset, y, tw, th);
            }
            row++;
        }
    }

    function drawHerringbone(mX, mY, rW, rH, tw, th) {
        ctx.translate(mX + rW/2, mY + rH/2);
        ctx.rotate(Math.PI / 4); // 45 degree tilt
        let size = Math.max(rW, rH) * 2;
        for (let x = -size; x < size; x += th) {
            for (let y = -size; y < size; y += th) {
                ctx.save();
                ctx.translate(x, y);
                // Draw the 'V' shape
                ctx.strokeRect(0, 0, tw, th);
                ctx.rotate(Math.PI / 2);
                ctx.strokeRect(0, -tw, th, tw);
                ctx.restore();
            }
        }
    }

    function unlock() { document.getElementById('app').classList.remove('locked'); alert("Full Layout Unlocked!"); }
    function runAI() { alert("AI: Re-centering grid for zero-sliver layout..."); }

    update();
</script>
</body>
</html>
