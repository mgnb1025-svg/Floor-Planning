<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudioArchitect | Professional Workspace</title>
    <style>
        :root { --gold: #C5A059; --dark: #121212; --border: #e0e0e0; }
        body { font-family: -apple-system, sans-serif; margin: 0; display: flex; height: 100vh; background: #1a1a1a; overflow: hidden; }
        
        /* Sidebar Styles */
        .sidebar { width: 400px; background: white; border-right: 1px solid var(--border); overflow-y: auto; padding: 25px; flex-shrink: 0; z-index: 100; }
        
        /* THE WORKSPACE FIX */
        .workspace { flex-grow: 1; position: relative; display: flex; align-items: center; justify-content: center; padding: 40px; overflow: auto; }
        .canvas-container { position: relative; background: #333; box-shadow: 0 0 100px rgba(0,0,0,0.5); display: inline-block; }
        #blueprint-display { display: block; max-width: 90vw; max-height: 90vh; pointer-events: none; }
        canvas { position: absolute; top: 0; left: 0; z-index: 10; pointer-events: none; }

        h2 { font-weight: 300; letter-spacing: 2px; text-transform: uppercase; font-size: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        h3 { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: #999; margin: 20px 0 10px 0; font-weight: 800; }
        
        .asset-grid { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .asset-thumb { width: 50px; height: 50px; border-radius: 4px; object-fit: cover; cursor: pointer; border: 2px solid #eee; }
        .asset-thumb.active { border-color: var(--gold); }
        .upload-btn { border: 2px dashed var(--gold); display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--gold); cursor: pointer; width: 50px; height: 50px; }

        input, select { width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #eee; margin-bottom: 10px; font-size: 13px; box-sizing: border-box; }
        .total-box { background: var(--dark); color: white; padding: 20px; border-radius: 8px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Studio<span style="color:var(--gold); font-weight:700;">Architect</span></h2>

    <section>
        <h3>1. Multi-Plan Assets</h3>
        <div class="asset-grid" id="assetGrid">
            <div class="asset-thumb upload-btn" onclick="document.getElementById('fileInput').click()">+</div>
        </div>
        <input type="file" id="fileInput" hidden accept="image/*" multiple onchange="handleAssets(event)">
        
        <label style="font-size:9px; font-weight:800;">GRID OPACITY</label>
        <input type="range" id="opac" min="0" max="1" step="0.1" value="0.5" oninput="render()">
    </section>

    <section>
        <h3>2. Workspace Calibration</h3>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <div><label style="font-size:9px;">ROOM LENGTH (FT)</label><input type="number" id="roomL" value="19.8" oninput="render()"></div>
            <div><label style="font-size:9px;">ROOM WIDTH (FT)</label><input type="number" id="roomW" value="15" oninput="render()"></div>
        </div>
        <label style="font-size:9px;">PATTERN ROTATION (°)</label>
        <input type="range" id="rot" min="0" max="360" value="0" oninput="render()">
        <label style="font-size:9px;">POSITION (X/Y)</label>
        <div style="display:flex; gap:10px;">
            <input type="range" id="offX" min="-500" max="500" value="0" oninput="render()">
            <input type="range" id="offY" min="-500" max="500" value="0" oninput="render()">
        </div>
    </section>

    <section>
        <h3>3. Tile Pattern</h3>
        <select id="pattern" onchange="render()">
            <option value="stack">Stack Bond</option>
            <option value="brick">Brick Offset</option>
            <option value="herringbone">Herringbone</option>
            <option value="chevron">Chevron</option>
        </select>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <div><label style="font-size:9px;">TILE W (IN)</label><input type="number" id="tileW" value="12" oninput="render()"></div>
            <div><label style="font-size:9px;">TILE H (IN)</label><input type="number" id="tileH" value="24" oninput="render()"></div>
        </div>
    </section>

    <div class="total-box">
        <div style="font-size:10px; color:#999; text-transform:uppercase;">Estimated Bid</div>
        <div id="totalDisplay" style="color:var(--gold); font-size:24px; font-weight:bold;">$0.00</div>
    </div>
</div>

<div class="workspace">
    <div class="canvas-container" id="container">
        <img id="blueprint-display" src="" alt="Upload a floor plan to begin">
        <canvas id="canvas"></canvas>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const imgDisplay = document.getElementById('blueprint-display');
    const assetGrid = document.getElementById('assetGrid');
    let assets = [];

    function handleAssets(e) {
        const files = Array.from(e.target.files);
        files.forEach(file => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                assets.push(ev.target.result);
                const thumb = document.createElement('img');
                thumb.src = ev.target.result;
                thumb.className = 'asset-thumb';
                thumb.onclick = () => {
                    imgDisplay.src = thumb.src;
                    document.querySelectorAll('.asset-thumb').forEach(t => t.classList.remove('active'));
                    thumb.classList.add('active');
                };
                assetGrid.insertBefore(thumb, assetGrid.lastElementChild);
                if(assets.length === 1) {
                    imgDisplay.src = assets[0];
                    thumb.classList.add('active');
                }
            };
            reader.readAsDataURL(file);
        });
    }

    imgDisplay.onload = () => {
        canvas.width = imgDisplay.width;
        canvas.height = imgDisplay.height;
        render();
    };

    function render() {
        if(!imgDisplay.src || imgDisplay.src.includes('begin')) return;
        
        // Sync canvas to image scale
        canvas.width = imgDisplay.width;
        canvas.height = imgDisplay.height;
        
        const rL = parseFloat(document.getElementById('roomL').value) || 1;
        const rW = parseFloat(document.getElementById('roomW').value) || 1;
        const tW = parseFloat(document.getElementById('tileW').value) || 12;
        const tH = parseFloat(document.getElementById('tileH').value) || 12;
        const rot = parseFloat(document.getElementById('rot').value) || 0;
        const ox = parseFloat(document.getElementById('offX').value) || 0;
        const oy = parseFloat(document.getElementById('offY').value) || 0;
        const pat = document.getElementById('pattern').value;

        // Auto-scale tiles based on room dimensions
        const scale = Math.min((canvas.width * 0.5) / rL, (canvas.height * 0.5) / rW);
        const dw = rL * scale; const dh = rW * scale;
        const twp = (tW / 12) * scale; const thp = (tH / 12) * scale;
        const mx = (canvas.width - dw) / 2; const my = (canvas.height - dh) / 2;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.globalAlpha = document.getElementById('opac').value;
        ctx.save();
        
        // Clipping to specific room size
        ctx.beginPath(); ctx.rect(mx, my, dw, dh); ctx.clip();
        ctx.translate(mx + dw/2 + ox, my + dh/2 + oy);
        ctx.rotate(rot * Math.PI / 180);
        
        ctx.strokeStyle = "rgba(0,0,0,0.8)";
        const b = Math.max(canvas.width, canvas.height) * 2;

        // Draw Logic
        if (pat === 'herringbone') {
            for (let x = -b; x < b; x += thp) {
                for (let y = -b; y < b; y += thp) {
                    ctx.save(); ctx.translate(x, y);
                    ctx.strokeRect(0, 0, twp, thp);
                    ctx.rotate(Math.PI / 2); ctx.strokeRect(0, -twp, thp, twp);
                    ctx.restore();
                }
            }
        } else {
            let row = 0;
            for (let y = -b; y < b; y += thp) {
                let shift = (pat === 'brick' && row % 2 !== 0) ? twp/2 : 0;
                for (let x = -b; x < b; x += twp) {
                    ctx.strokeRect(x + shift, y, twp, thp);
                }
                row++;
            }
        }
        ctx.restore();
        ctx.globalAlpha = 1;
        ctx.strokeStyle = "var(--gold)"; ctx.lineWidth = 3; ctx.strokeRect(mx, my, dw, dh);
        
        document.getElementById('totalDisplay').innerText = "$" + (rL * rW * 15).toLocaleString();
    }
</script>
</body>
</html>
