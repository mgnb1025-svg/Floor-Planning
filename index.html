<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StudioArchitect | Pro Asset Edition</title>
    <style>
        :root { --gold: #C5A059; --dark: #121212; --border: #e0e0e0; --bg: #f8f9fa; }
        body { font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: var(--bg); overflow: hidden; }
        @media (min-width: 768px) { body { flex-direction: row; } .sidebar { width: 420px; } }
        
        .sidebar { background: white; border-right: 1px solid var(--border); overflow-y: auto; padding: 25px; flex-shrink: 0; box-sizing: border-box; z-index: 10; box-shadow: 10px 0 30px rgba(0,0,0,0.03); }
        .viewport { flex-grow: 1; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #1a1a1a; }
        
        h2 { font-weight: 300; letter-spacing: 2px; text-transform: uppercase; font-size: 15px; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; color: var(--dark); }
        h3 { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: #aaa; margin: 20px 0 10px 0; font-weight: 800; display: flex; justify-content: space-between; }
        
        /* Multi-Asset Gallery Styles */
        .asset-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .asset-thumb { width: 100%; aspect-ratio: 1; background: #eee; border-radius: 6px; object-fit: cover; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .asset-thumb.active { border-color: var(--gold); transform: scale(0.95); }
        .upload-trigger { border: 2px dashed #ddd; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #ccc; cursor: pointer; border-radius: 6px; }
        .upload-trigger:hover { border-color: var(--gold); color: var(--gold); background: #fffcf5; }

        label { font-size: 9px; font-weight: 700; color: #555; margin-bottom: 5px; display: block; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #eee; margin-bottom: 12px; font-size: 13px; background: #fafafa; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--gold); background: white; }
        
        .canvas-container { position: relative; background: white; box-shadow: 0 50px 100px rgba(0,0,0,0.4); overflow: hidden; border-radius: 4px; }
        canvas { position: absolute; top: 0; left: 0; z-index: 5; pointer-events: none; }
        #blueprint-display { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; z-index: 1; transition: opacity 0.3s; }
        
        .control-group { background: #fdfdfd; padding: 15px; border-radius: 10px; border: 1px solid #f0f0f0; margin-bottom: 15px; }
        .total-box { background: var(--dark); color: white; padding: 25px; border-radius: 12px; margin-top: 20px; }
        
        .btn-export { width: 100%; padding: 15px; background: var(--gold); color: white; border: none; border-radius: 6px; font-weight: 700; text-transform: uppercase; cursor: pointer; font-size: 11px; letter-spacing: 1px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Studio<span style="color:var(--gold); font-weight:700;">Architect</span></h2>

    <section>
        <h3>Project Assets <span>Select to switch</span></h3>
        <div class="asset-grid" id="assetGrid">
            <div class="asset-thumb upload-trigger" onclick="document.getElementById('multiUpload').click()">+</div>
        </div>
        <input type="file" id="multiUpload" hidden accept="image/*" multiple onchange="handleAssets(event)">
        
        <div class="control-group">
            <label>Blueprint Clarity</label>
            <input type="range" id="opac" min="0" max="1" step="0.1" value="0.6" oninput="refresh()">
        </div>
    </section>

    <section>
        <h3>Space Calibration</h3>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
            <div><label>Room Length (ft)</label><input type="number" id="roomL" value="15" oninput="refresh()"></div>
            <div><label>Room Width (ft)</label><input type="number" id="roomW" value="12" oninput="refresh()"></div>
        </div>
        <label>Rotation Control (°)</label>
        <input type="range" id="rot" min="0" max="360" value="0" oninput="refresh()">
        <label>Pattern Offset (X / Y)</label>
        <div style="display:flex; gap:10px;">
            <input type="range" id="offX" min="-200" max="200" value="0" oninput="refresh()">
            <input type="range" id="offY" min="-200" max="200" value="0" oninput="refresh()">
        </div>
    </section>

    <section>
        <h3>Tile Configuration</h3>
        <select id="pattern" onchange="refresh()">
            <option value="stack">Standard Stack</option>
            <option value="brick">Brick Joint (1/2)</option>
            <option value="stagger">1/3 Offset Stagger</option>
            <option value="herringbone">Herringbone</option>
            <option value="chevron">Chevron</option>
            <option value="basket">Basketweave</option>
        </select>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
            <div><label>Tile W (in)</label><input type="number" id="tileW" value="12" oninput="refresh()"></div>
            <div><label>Tile H (in)</label><input type="number" id="tileH" value="24" oninput="refresh()"></div>
        </div>
    </section>

    <div class="total-box">
        <label style="color:#666;">Material Cost / SqFt</label>
        <input type="number" id="unitPrice" value="12.50" oninput="refresh()" style="background:transparent; border:none; border-bottom:1px solid #333; color:var(--gold); font-size:24px; font-weight:bold; margin-bottom:5px;">
        <div style="display:flex; justify-content:space-between; align-items:flex-end;">
            <div style="font-size:10px; color:#aaa;">Estimated Project Total:</div>
            <div id="total" style="color:var(--gold); font-size:18px; font-weight:800;">$0.00</div>
        </div>
    </div>
    
    <button class="btn-export" onclick="window.print()">Export Design Package</button>
</div>

<div class="viewport">
    <div class="canvas-container" id="frame">
        <img id="blueprint-display" src="" alt="">
        <canvas id="canvas"></canvas>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const display = document.getElementById('blueprint-display');
    const assetGrid = document.getElementById('assetGrid');
    let projectAssets = [];

    // FIX: Multi-upload functionality
    function handleAssets(e) {
        const files = Array.from(e.target.files);
        files.forEach(file => {
            const reader = new FileReader();
            reader.onload = (event) => {
                const url = event.target.result;
                projectAssets.push(url);
                addThumbnail(url);
                if (projectAssets.length === 1) switchAsset(0);
                saveProject();
            };
            reader.readAsDataURL(file);
        });
    }

    function addThumbnail(url) {
        const thumb = document.createElement('img');
        thumb.src = url;
        thumb.className = 'asset-thumb';
        thumb.onclick = () => {
            document.querySelectorAll('.asset-thumb').forEach(t => t.classList.remove('active'));
            thumb.classList.add('active');
            display.src = url;
            refresh();
        };
        assetGrid.insertBefore(thumb, assetGrid.lastElementChild);
    }

    function switchAsset(idx) {
        display.src = projectAssets[idx];
        display.onload = refresh;
    }

    function refresh() {
        const l = parseFloat(document.getElementById('roomL').value) || 1;
        const w = parseFloat(document.getElementById('roomW').value) || 1;
        const tw = parseFloat(document.getElementById('tileW').value) || 12;
        const th = parseFloat(document.getElementById('tileH').value) || 12;
        const pat = document.getElementById('pattern').value;
        const rot = parseFloat(document.getElementById('rot').value) || 0;
        const ox = parseFloat(document.getElementById('offX').value) || 0;
        const oy = parseFloat(document.getElementById('offY').value) || 0;
        const price = parseFloat(document.getElementById('unitPrice').value) || 0;

        // Viewport Logic
        const size = Math.min(window.innerWidth - 460, window.innerHeight - 80);
        document.getElementById('frame').style.width = size + "px";
        document.getElementById('frame').style.height = size + "px";
        canvas.width = size; canvas.height = size;
        display.style.opacity = document.getElementById('opac').value;

        // Math
        const sqft = l * w;
        const waste = (pat === 'herringbone' || pat === 'chevron') ? 1.20 : 1.10;
        document.getElementById('total').innerText = "$" + (sqft * waste * price).toLocaleString(undefined, {minimumFractionDigits:2});

        draw(l, w, tw, th, pat, rot, ox, oy);
    }

    function draw(l, w, tw, th, pat, rot, ox, oy) {
        const scale = Math.min((canvas.width - 40) / l, (canvas.height - 40) / w);
        const dw = l * scale; const dh = w * scale;
        const twp = (tw / 12) * scale; const thp = (th / 12) * scale;
        const mx = (canvas.width - dw) / 2; const my = (canvas.height - dh) / 2;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        ctx.beginPath(); ctx.rect(mx, my, dw, dh); ctx.clip();
        
        ctx.translate(mx + dw/2 + ox, my + dh/2 + oy);
        ctx.rotate(rot * Math.PI / 180);
        ctx.strokeStyle = "rgba(0,0,0,0.4)";
        ctx.lineWidth = 1;

        const bound = Math.max(dw, dh) * 3;

        if (pat === 'herringbone') {
            for (let x = -bound; x < bound; x += thp) {
                for (let y = -bound; y < bound; y += thp) {
                    ctx.save(); ctx.translate(x, y);
                    ctx.strokeRect(0, 0, twp, thp);
                    ctx.rotate(Math.PI / 2); ctx.strokeRect(0, -twp, thp, twp);
                    ctx.restore();
                }
            }
        } else if (pat === 'chevron') {
            for(let x = -bound; x < bound; x += twp) {
                for(let y = -bound; y < bound; y += thp) {
                    ctx.beginPath();
                    if(Math.floor(x/twp)%2==0) { ctx.moveTo(x,y); ctx.lineTo(x+twp, y+thp/2); ctx.lineTo(x, y+thp); }
                    else { ctx.moveTo(x+twp,y); ctx.lineTo(x, y+thp/2); ctx.lineTo(x+twp, y+thp); }
                    ctx.stroke();
                }
            }
        } else {
            let r = 0;
            for (let y = -bound; y < bound; y += thp) {
                let off = (pat === 'brick') ? (r % 2 !== 0 ? twp/2 : 0) : (pat === 'stagger' ? (r % 3) * (twp/3) : 0);
                for (let x = -bound; x < bound; x += twp) {
                    ctx.strokeRect(x + off, y, twp, thp);
                }
                r++;
            }
        }
        ctx.restore();
        ctx.strokeStyle = "#121212"; ctx.lineWidth = 3; ctx.strokeRect(mx, my, dw, dh);
    }

    // Auto-Save feature
    function saveProject() {
        const config = {
            l: document.getElementById('roomL').value,
            w: document.getElementById('roomW').value,
            tw: document.getElementById('tileW').value,
            th: document.getElementById('tileH').value,
            price: document.getElementById('unitPrice').value
        };
        localStorage.setItem('studio_architect_save', JSON.stringify(config));
    }

    window.onload = () => {
        const saved = localStorage.getItem('studio_architect_save');
        if (saved) {
            const c = JSON.parse(saved);
            document.getElementById('roomL').value = c.l;
            document.getElementById('roomW').value = c.w;
            document.getElementById('tileW').value = c.tw;
            document.getElementById('tileH').value = c.th;
            document.getElementById('unitPrice').value = c.price;
        }
        refresh();
    };

    window.onresize = refresh;
</script>
</body>
</html>
