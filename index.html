<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TileArchitect AI Pro | Design & Estimate</title>
    <style>
        :root { --pro-gold: #d4af37; --ai-purple: #8a2be2; --success: #38a169; --bg: #1a202c; --card: #ffffff; }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: var(--bg); color: #333; overflow: hidden; }
        @media (min-width: 768px) { body { flex-direction: row; } .sidebar { width: 400px; height: 100vh; } }
        
        .sidebar { background: var(--card); border-right: 1px solid #e2e8f0; overflow-y: auto; padding: 20px; flex-shrink: 0; box-sizing: border-box; }
        .viewport { flex-grow: 1; position: relative; background: #2d3748; display: flex; align-items: center; justify-content: center; padding: 20px; }
        
        section { border-bottom: 1px solid #edf2f7; padding: 15px 0; }
        h3 { font-size: 14px; color: #4a5568; margin: 0 0 10px 0; text-transform: uppercase; letter-spacing: 1px; }
        label { font-size: 10px; font-weight: bold; color: #718096; display: block; margin-bottom: 5px; }
        
        input, select, button { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #cbd5e0; margin-bottom: 10px; font-size: 14px; box-sizing: border-box; }
        .btn-ai { background: var(--ai-purple); color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-pay { background: var(--success); color: white; border: none; font-weight: bold; cursor: pointer; }
        
        canvas { background: white; border-radius: 4px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); max-width: 100%; height: auto; transition: all 0.3s ease; }
        .locked canvas { filter: grayscale(1) opacity(0.5); }
        .watermark { position: absolute; font-size: 30px; font-weight: 900; color: rgba(255,255,255,0.2); transform: rotate(-30deg); pointer-events: none; z-index: 5; text-align: center; display: none; }
        .locked .watermark { display: block; }
        
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .ai-status { font-size: 12px; background: #f3e5f5; padding: 12px; border-radius: 8px; border-left: 4px solid var(--ai-purple); color: #4a148c; }
    </style>
</head>
<body class="locked" id="app">

<div class="sidebar">
    <h2 style="margin:0 0 20px 0; font-size: 22px;">TileArchitect <span style="color:var(--ai-purple)">AI</span></h2>

    <section>
        <h3>📏 1. Room Dimensions</h3>
        <div class="stat-grid">
            <div><label>LENGTH (FT)</label><input type="number" id="roomL" value="12" oninput="update()"></div>
            <div><label>WIDTH (FT)</label><input type="number" id="roomW" value="10" oninput="update()"></div>
        </div>
        <label>WALL VARIANCE (INCHES)</label>
        <input type="number" id="variance" value="0.25" step="0.125" oninput="update()">
    </section>

    <section>
        <h3>🎨 2. Flooring Design</h3>
        <label>MATERIAL TYPE</label>
        <select id="mType" onchange="update()">
            <option value="tile">Ceramic/Porcelain Tile</option>
            <option value="lvp">Luxury Vinyl Plank (LVP)</option>
            <option value="wood">Hardwood</option>
        </select>
        <div class="stat-grid">
            <div><label>UNIT WIDTH (IN)</label><input type="number" id="tileW" value="12" oninput="update()"></div>
            <div><label>UNIT HEIGHT (IN)</label><input type="number" id="tileH" value="24" oninput="update()"></div>
        </div>
        <label>GROUT LINE (IN)</label>
        <input type="number" id="grout" value="0.125" step="0.0625" oninput="update()">
    </section>

    <section style="background: #fff5f5; padding: 15px; border-radius: 8px; border: 1px solid #feb2b2;">
        <h3 style="color:#c53030; margin:0;">📦 Order Estimate</h3>
        <div style="font-size: 18px; margin: 5px 0;"><strong><span id="boxCount">0</span> Boxes</strong> Needed</div>
        <div style="font-size: 11px; color: #718096;">Includes <span id="wPercent">7</span>% AI Waste Factor</div>
    </section>

    <section>
        <button class="btn-ai" onclick="runAI()">✨ Run AI Layout Fix</button>
        <div id="aiMsg" class="ai-status" style="margin-top:10px;">Ready to optimize...</div>
    </section>

    <section>
        <button class="btn-pay" onclick="unlock()">Unlock Full Blueprint (<span id="price">$0.00</span>)</button>
        <p style="font-size:10px; text-align:center; color:#718096;">Unlock to view cut-lists and high-res dimensions.</p>
    </section>
</div>

<div class="viewport">
    <div class="watermark">PREVIEW ONLY<br>PAY TO UNLOCK DATA</div>
    <canvas id="canvas" width="800" height="800"></canvas>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    function update() {
        const rL = parseFloat(document.getElementById('roomL').value) || 0;
        const rW = parseFloat(document.getElementById('roomW').value) || 0;
        const tW = parseFloat(document.getElementById('tileW').value) || 12;
        const tH = parseFloat(document.getElementById('tileH').value) || 12;
        const grout = parseFloat(document.getElementById('grout').value) || 0;
        const variance = parseFloat(document.getElementById('variance').value) || 0;

        // Pricing & Waste
        const sqft = rL * rW;
        document.getElementById('price').innerText = "$" + (sqft * 0.10).toFixed(2);
        
        let waste = variance > 0.5 ? 0.15 : 0.07;
        document.getElementById('wPercent').innerText = (waste * 100);
        document.getElementById('boxCount').innerText = Math.ceil((sqft * (1+waste)) / 22.5);

        draw(rL, rW, tW, tH, grout);
    }

    function draw(rL, rW, tW, tH, grout) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const margin = 50;
        const availableWidth = canvas.width - (margin * 2);
        const availableHeight = canvas.height - (margin * 2);
        
        // Scale calculations
        const scale = Math.min(availableWidth / rL, availableHeight / rW);
        const drawW = rL * scale;
        const drawH = rW * scale;
        const tW_px = (tW / 12) * scale;
        const tH_px = (tH / 12) * scale;
        const g_px = (grout / 12) * scale;

        // Draw Tiles
        ctx.strokeStyle = "#cbd5e0";
        for (let x = margin; x < margin + drawW; x += tW_px + g_px) {
            for (let y = margin; y < margin + drawH; y += tH_px + g_px) {
                ctx.strokeRect(x, y, tW_px, tH_px);
            }
        }

        // Draw Room Boundary
        ctx.strokeStyle = "#1a202c";
        ctx.lineWidth = 5;
        ctx.strokeRect(margin, margin, drawW, drawH);
    }

    function runAI() {
        document.getElementById('aiMsg').innerText = "Analyzing geometry...";
        setTimeout(() => {
            document.getElementById('aiMsg').innerHTML = "<strong>AI Optimization:</strong> Centered layout to avoid sliver cuts on North wall. Adjusted for variance.";
        }, 1500);
    }

    function unlock() {
        document.getElementById('app').classList.remove('locked');
        alert("Payment Successful! Technical Blueprint Unlocked.");
    }

    update();
</script>
</body>
</html>
