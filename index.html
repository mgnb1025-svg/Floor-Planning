<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TileArchitect | Studio Pro</title>
    <style>
        :root { 
            --gold: #C5A059; 
            --accent: #8a2be2; 
            --dark: #121212; 
            --light-gray: #f8f9fa;
            --border: #e0e0e0;
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; display: flex; flex-direction: column; height: 100vh; 
            background: #f0f0f0; color: var(--dark); overflow: hidden; 
        }
        
        @media (min-width: 768px) { 
            body { flex-direction: row; } 
            .sidebar { width: 380px; height: 100vh; } 
        }

        /* Sidebar Styling */
        .sidebar { 
            background: white; border-right: 1px solid var(--border); 
            overflow-y: auto; padding: 30px; flex-shrink: 0; box-sizing: border-box;
            box-shadow: 10px 0 30px rgba(0,0,0,0.02);
        }

        .viewport { 
            flex-grow: 1; position: relative; background: #e5e5e5; 
            display: flex; align-items: center; justify-content: center; padding: 40px; 
        }

        h2 { font-weight: 300; letter-spacing: 2px; text-transform: uppercase; font-size: 18px; margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        h3 { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: #999; margin: 25px 0 15px 0; }
        
        /* Form Elements */
        label { font-size: 9px; font-weight: 700; color: #444; margin-bottom: 6px; display: block; text-transform: uppercase; }
        input, select { 
            width: 100%; padding: 12px; border-radius: 4px; border: 1px solid #eee; 
            margin-bottom: 15px; font-size: 13px; background: var(--light-gray);
            transition: all 0.3s ease;
        }
        input:focus { border-color: var(--gold); outline: none; background: white; }

        /* Premium Buttons */
        .btn { 
            width: 100%; padding: 15px; border-radius: 4px; border: none; 
            font-size: 11px; font-weight: 800; text-transform: uppercase; 
            letter-spacing: 1px; cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .btn-ai { background: var(--dark); color: white; }
        .btn-ai:hover { background: #333; transform: translateY(-2px); }
        .btn-pay { background: var(--gold); color: white; margin-top: 5px; }
        .btn-pay:hover { filter: brightness(1.1); transform: translateY(-2px); }

        /* Hardware Marketplace */
        .hw-section { margin-top: 20px; padding: 15px; background: #fdfdfd; border: 1px solid #f0f0f0; border-radius: 8px; }
        .hw-link { 
            display: block; font-size: 10px; color: var(--gold); text-decoration: none; 
            margin-bottom: 8px; font-weight: 600; text-transform: uppercase;
        }

        /* Canvas & Frame */
        .canvas-container { position: relative; padding: 20px; background: white; box-shadow: 0 40px 100px rgba(0,0,0,0.1); border-radius: 2px; }
        canvas { background: white; display: block; }
        
        .locked .canvas-container { filter: grayscale(1) blur(8px); opacity: 0.3; }
        .watermark { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-15deg);
            font-size: 20px; font-weight: 300; letter-spacing: 5px; color: var(--dark); 
            opacity: 0.1; white-space: nowrap; pointer-events: none; display: none;
        }
        .locked .watermark { display: block; }

        .cost-card { background: #1a1a1a; color: white; padding: 20px; border-radius: 8px; margin: 20px 0; }
        .cost-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 12px; }
        .total-price { font-size: 20px; color: var(--gold); font-weight: 300; border-top: 1px solid #333; padding-top: 10px; margin-top: 10px; }
    </style>
</head>
<body class="locked" id="app">

<div class="sidebar">
    <h2>Studio<span style="color:var(--gold); font-weight:700;">Architect</span></h2>

    <section>
        <h3>Dimensions & Space</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div><label>Length (ft)</label><input type="number" id="roomL" value="12" oninput="update()"></div>
            <div><label>Width (ft)</label><input type="number" id="roomW" value="10" oninput="update()"></div>
        </div>
        <a href="https://www.google.com/search?q=Leica+Disto+D2" target="_blank" class="hw-link">→ Calibrate with Leica Disto D2</a>
    </section>

    <section>
        <h3>Material & Pattern</h3>
        <label>Layout Style</label>
        <select id="pattern" onchange="update()">
            <option value="stack">Standard Stack</option>
            <option value="brick">Brick Joint (50%)</option>
            <option value="stagger">1/3 Stagger</option>
            <option value="herringbone">Herringbone</option>
            <option value="chevron">Chevron</option>
            <option value="basket">Basketweave</option>
        </select>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div><label>Tile Width (in)</label><input type="number" id="tileW" value="12" oninput="update()"></div>
            <div><label>Tile Height (in)</label><input type="number" id="tileH" value="24" oninput="update()"></div>
        </div>
        <label>Grout Joint (in)</label>
        <input type="number" id="grout" value="0.125" step="0.0625" oninput="update()">
    </section>

    <div class="cost-card">
        <label style="color:#aaa;">Est. Material Cost (sqft)</label>
        <input type="number" id="unitPrice" value="12.00" step="0.50" oninput="update()" style="background:#333; border:none; color:white;">
        <div class="cost-row"><span>Coverage (incl. waste)</span> <span id="boxCount">0</span> Boxes</div>
        <div class="cost-row"><span>Complexity Factor</span> <span id="wastePct">7</span>%</div>
        <div class="cost-row total-price"><span>Total Bid</span> <span id="totalCost">$0.00</span></div>
    </div>

    <section class="hw-section">
        <h3>Designer Tools</h3>
        <a href="https://www.google.com/search?q=iPad+Pro+M4+13+inch" target="_blank" class="hw-link">🛒 iPad Pro M4 (LiDAR Scan)</a>
        <a href="https://www.google.com/search?q=Dremel+Ultra+Saw" target="_blank" class="hw-link">🛒 Dremel Ultra-Saw</a>
    </section>

    <button class="btn btn-ai" onclick="runAI()">✨ Optimize with AI</button>
    <button class="btn btn-pay" onclick="unlock()">Unlock Full Blueprint (<span id="unlockPrice">$0.00</span>)</button>
</div>

<div class="viewport">
    <div class="canvas-container">
        <div class="watermark">DESIGN PROPOSAL LOCKED</div>
        <canvas id="canvas" width="700" height="700"></canvas>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    function update() {
        const rL = parseFloat(document.getElementById('roomL').value) || 12;
        const rW = parseFloat(document.getElementById('roomW').value) || 10;
        const tW = parseFloat(document.getElementById('tileW').value) || 12;
        const tH = parseFloat(document.getElementById('tileH').value) || 24;
        const uPrice = parseFloat(document.getElementById('unitPrice').value) || 0;
        const pattern = document.getElementById('pattern').value;
        const grout = parseFloat(document.getElementById('grout').value) || 0;

        const sqft = rL * rW;
        document.getElementById('unlockPrice').innerText = "$" + (sqft * 0.15).toFixed(2);
        
        let waste = 0.07;
        if(pattern === 'herringbone' || pattern === 'chevron') waste = 0.20;
        else if(pattern !== 'stack') waste = 0.12;
        
        document.getElementById('wastePct').innerText = (waste * 100).toFixed(0);
        const totalNeeded = sqft * (1 + waste);
        document.getElementById('boxCount').innerText = Math.ceil(totalNeeded / 22.5);
        document.getElementById('totalCost').innerText = "$" + (totalNeeded * uPrice).toLocaleString(undefined, {minimumFractionDigits: 2});

        draw(rL, rW, tW, tH, grout, pattern);
    }

    function draw(rL, rW, tW, tH, grout, pattern) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const margin = 40;
        const scale = Math.min((canvas.width - 80) / rL, (canvas.height - 80) / rW);
        const dW = rL * scale; const dH = rW * scale;
        const twP = (tW / 12) * scale; const thP = (tH / 12) * scale; const gP = (grout / 12) * scale;

        ctx.save();
        ctx.beginPath(); ctx.rect(margin, margin, dW, dH); ctx.clip();
        ctx.strokeStyle = "#e0e0e0";
        ctx.lineWidth = 0.5;

        if (pattern === 'herringbone') drawHerringbone(margin, margin, dW, dH, twP, thP);
        else if (pattern === 'chevron') drawChevron(margin, margin, dW, dH, twP, thP);
        else if (pattern === 'basket') drawBasket(margin, margin, dW, dH, twP, thP);
        else drawStandard(margin, margin, dW, dH, twP, thP, gP, pattern);

        ctx.restore();
        ctx.strokeStyle = "#121212"; ctx.lineWidth = 2; ctx.strokeRect(margin, margin, dW, dH);
    }

    function drawStandard(mX, mY, rW, rH, tw, th, gp, type) {
        let row = 0;
        for (let y = mY; y < mY + rH + th; y += (th + gp)) {
            let offset = 0;
            if (type === 'brick' && row % 2 !== 0) offset = (tw + gp) / 2;
            if (type === 'stagger' && row % 2 !== 0) offset = (tw + gp) / 3;
            for (let x = mX - tw; x < mX + rW + tw; x += (tw + gp)) {
                ctx.strokeRect(x + offset, y, tw, th);
            }
            row++;
        }
    }

    function drawHerringbone(mX, mY, rW, rH, tw, th) {
        ctx.translate(mX + rW/2, mY + rH/2); ctx.rotate(Math.PI / 4);
        let s = Math.max(rW, rH) * 2;
        for (let x = -s; x < s; x += th) {
            for (let y = -s; y < s; y += th) {
                ctx.save(); ctx.translate(x, y);
                ctx.strokeRect(0, 0, tw, th);
                ctx.rotate(Math.PI / 2); ctx.strokeRect(0, -tw, th, tw);
                ctx.restore();
            }
        }
    }

    function drawChevron(mX, mY, rW, rH, tw, th) {
        for(let x=mX-tw; x < mX+rW+tw; x += tw) {
            for(let y=mY-th; y < mY+rH+th; y += th) {
                ctx.beginPath();
                if(Math.floor(x/tw)%2==0) { ctx.moveTo(x,y); ctx.lineTo(x+tw, y+th/2); ctx.lineTo(x, y+th); }
                else { ctx.moveTo(x+tw,y); ctx.lineTo(x, y+th/2); ctx.lineTo(x+tw, y+th); }
                ctx.stroke();
            }
        }
    }

    function drawBasket(mX, mY, rW, rH, tw, th) {
        let size = Math.max(tw, th);
        for (let x = mX; x < mX + rW; x += size) {
            for (let y = mY; y < mY + rH; y += size) {
                ctx.save(); ctx.translate(x,y);
                if((Math.floor(x/size) + Math.floor(y/size)) % 2 == 0) {
                    ctx.strokeRect(0, 0, size/2, size); ctx.strokeRect(size/2, 0, size/2, size);
                } else {
                    ctx.strokeRect(0, 0, size, size/2); ctx.strokeRect(0, size/2, size, size/2);
                }
                ctx.restore();
            }
        }
    }

    function unlock() { document.getElementById('app').classList.remove('locked'); }
    function runAI() { alert("Studio AI: Re-centering design for optimal symmetry..."); }
    update();
</script>
</body>
</html>
